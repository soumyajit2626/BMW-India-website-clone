<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .img9 {
            width: 45px;
            position: fixed;
            right: 7vw;
            top: 80vh;
            border: none;
            border-radius: 10px;
        }

        body {
            margin: 0px;
        }

        .first {
            background-image: url(https://bmw.scene7.com/is/image/BMW/index-banner-v4:16to7?fmt=webp&wid=2560&hei=1120);
            background-size: cover;
        }

        .span1 {
            margin: 17px;
            color: azure;
            font-weight: bold;
            font-family: sans-serif;
            cursor: pointer;
        }

        button {
            cursor: pointer;
        }

        .btn1:hover {
            background-color: rgb(5, 101, 161);
        }

        .btn2:hover {
            background-color: rgb(5, 101, 161);
        }

        .written {
            text-shadow: 2px 2px 2px black;
        }





        nav {
            margin-top: -20px;
            margin-left: 150px;
        }

        .img {
            position: relative;
            left: 85px;
            top: 29px;
        }

        .written {
            padding-top: 50px;
            margin: 10px;
        }
        

        .btn1 {
            background-color: rgb(16, 101, 198);
            color: azure;
            height: 50px;
            border: none;
            width: 180px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 15px;
            padding: 10px;



        }

        .img9 {
            box-shadow: 4px 4px 4px black;
            cursor: pointer;
            transition-duration: 0.1s;
            transition-timing-function: ease-in-out;
        }
        .img9:hover{transform: scale(1.2,1.2);}

        .span2 {
            margin-left: 600px;
        }

        .second {
            color: azure;
            margin-left: 5vw;
            margin-top: 20vh;
        }

        .the_new {
            letter-spacing: 10px;
            font-size: 20px;
            margin-bottom: 0px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        .x3 {
            font-size: 250px;
            margin: 0px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        .price {
            margin: 0px;
            font-size: 24px;
        }

        .btn2 {
            width: 200px;
            height: 50px;
            margin-top: 10px;
            background-color: rgb(16, 101, 198);
            color: azure;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            padding: 5px;
            margin-bottom: 100px;
        }
    </style>
</head>

<body>
    <div class="first">
        <span class="img"><img
                src="https://www.bmw.in/content/dam/bmw/common/images/logo-icons/BMW/BMW_White_Logo.svg.asset.1670245093434.svg"
                alt=""></span>
        <nav>
            <span class="span1">

                <span class="written">All Models</span>
                <span class="written">Electric</span>
                <span class="written">Visit Online Shop </span>
                <span class="written">More BMW </span>
            </span>
            <span class="span2">
                <button class="btn1">Book a Test Drive</button>
            </span>

        </nav>
        <hr style="width: 1400px;margin-top: 30px;">
        <div class="second">
            <h4 class="the_new">
                THE NEW</h4>
            <p class="x3">
                X3</p>
            <p class="price">Price starting at ₹ 74,50,000.</p>
            <button class="btn2">Know
                More</button>

        </div>
    </div>
    <img src="download.png" alt="" class="img9">

</body>

</html>
